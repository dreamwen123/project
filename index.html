<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study Planner</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
</head>

<body class="bg-light">
  <main class="container py-4">
    <h1 class="text-center mb-4">My Study Planner</h1>
    
    <div class="card mb-4 shadow-sm">
      <div class="card-header bg-primary text-white">
        <h5 class="mb-0">Scheduled Study Sessions</h5>
      </div>
      <ul class="list-group list-group-flush" id="taskList">
        </ul>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-secondary text-white">
        <h5 class="mb-0">Add New Study Session</h5>
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Subject</label>
            <select id="subject" class="form-select">
              <option value="Mathematics">Mathematics</option>
              <option value="Chinese">Chinese</option>
              <option value="English">English</option>
              <option value="Science">Science</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Date of Study</label>
            <input type="date" id="studyDate" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Duration (hh:mm)</label>
            <input type="time" id="duration" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Urgency</label>
            <select id="urgency" class="form-select">
              <option value="1">1 - Very Low</option>
              <option value="2">2 - Low</option>
              <option value="3">3 - Medium</option>
              <option value="4">4 - High</option>
              <option value="5">5 - Critical</option>
            </select>
          </div>
          <div class="col-12 mt-3">
            <button class="btn btn-primary w-100" id="addTodo">Create Study Session</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>

</html>
