<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Study To-Do List</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f0f4f8;
      font-family: Georgia, serif;
    }
    h1 { color: #1a3c5e; }
    .urgency-1 { background-color: #28a745; }
    .urgency-2 { background-color: #7ab648; }
    .urgency-3 { background-color: #ffc107; color: #333 !important; }
    .urgency-4 { background-color: #fd7e14; }
    .urgency-5 { background-color: #dc3545; }
    .task-card { border-left: 5px solid #1a3c5e; margin-bottom: 10px; }
    #statusMsg { min-height: 28px; font-size: 0.9rem; }
  </style>
</head>

<body>
  <main class="container py-4">

    <h1 class="mb-1">📚 Study To-Do List</h1>
    <p class="text-muted mb-4">Plan your study sessions for Mathematics, Chinese, English &amp; Science</p>

    <!-- Status banner -->
    <div id="statusMsg" class="alert alert-info d-none" role="alert"></div>

    <!-- Task list -->
    <h4>My Study Tasks</h4>
    <ul class="list-group mb-4" id="taskList"></ul>

    <!-- Add new task form -->
    <h4>Add New Study Task</h4>
    <div class="card p-3 mb-4">
      <div class="mb-3">
        <label class="form-label">Subject</label>
        <select id="subject" class="form-select">
          <option value="Mathematics">Mathematics</option>
          <option value="Chinese">Chinese</option>
          <option value="English">English</option>
          <option value="Science">Science</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Date of Study (mm/dd/yyyy)</label>
        <input type="date" id="dateStudy" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Duration (hh:mm)</label>
        <input type="time" id="duration" class="form-control">
      </div>
      <div class="mb-3">
        <label class="form-label">Urgency (1 = Low, 5 = High)</label>
        <select id="urgency" class="form-select">
          <option value="1">1 – Very Low</option>
          <option value="2">2 – Low</option>
          <option value="3">3 – Medium</option>
          <option value="4">4 – High</option>
          <option value="5">5 – Very High</option>
        </select>
      </div>
      <button class="btn btn-primary" id="addTodo">➕ Add Task</button>
    </div>

    <!-- LO12: Quotable.io SaaS REST API -->
    <h4>Study Motivation</h4>
    <div class="card p-3 mb-4">
      <button class="btn btn-outline-secondary mb-3" id="fetchQuoteBtn">
        📖 Get a Study Quote
      </button>
      <div id="quoteBox" class="fst-italic text-secondary"></div>
    </div>

  </main>


     <!-- axios -->
   <script src="https://cdn.jsdelivr.net/npm/axios@1.16.0/dist/axios.min.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>

</html>
